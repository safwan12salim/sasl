version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: sasldb
      POSTGRES_USER: sasluser
      POSTGRES_PASSWORD: saslpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: daphne -b 0.0.0.0 -p 8000 sasl.asgi:application
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=False
      - SASL_DB=postgres
      - POSTGRES_DB=sasldb
      - POSTGRES_USER=sasluser
      - POSTGRES_PASSWORD=saslpass
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}

  frontend:
    build: ./frontend
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_volume: